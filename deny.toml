# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[licenses]
version = 2
# Allow common permissive licenses used by Rust ecosystem crates
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "0BSD",
    # Windows clipboard support (`clipboard-win`, `error-code`); OSI-approved.
    "BSL-1.0",
    "MPL-2.0",
    # Mozilla's public WebPKI root-certificate dataset, used by Rustls.
    "CDLA-Permissive-2.0",
]
# Fail build on unapproved licenses
confidence-threshold = 0.93

[licenses.private]
ignore = true

[bans]
# Warn on multiple versions of the same crate
multiple-versions = "warn"
# Warn (not fail) on wildcard dependencies
wildcards = "warn"
highlight = "all"

[advisories]
# cargo-deny 0.19+: vulnerability advisories always fail unless ignored.
# unmaintained scope: all | workspace | transitive | none
# (0.19 removed severity levels like "warn"; workspace flags direct deps only)
unmaintained = "workspace"
yanked = "deny"
# wayland-scanner 0.31.10 pins quick-xml 0.39 and uses it only as a proc macro
# over trusted, vendored Wayland protocol XML at build time. The vulnerable
# untrusted-runtime XML paths are not present in the shipped tray. Remove these
# exceptions when wayland-scanner accepts quick-xml >= 0.41.
ignore = [
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[sources]
# Only allow crates from crates.io by default
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
