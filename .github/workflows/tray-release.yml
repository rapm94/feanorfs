# Build the macOS tray after cargo-dist has created the GitHub Release.
# Keeping this separate leaves cargo-dist's generated release.yml reproducible.
name: Tray release

on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: ["Release"]
    types: [completed]

permissions: {}

concurrency:
  group: tray-release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  build-tray:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    name: feanorfs-tray (${{ matrix.target }})
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Verify release tag
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
          REPOSITORY: ${{ github.repository }}
        run: |
          TAG_OBJECT="$(gh api "repos/$REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          TAG_SHA="$(jq -r '.object.sha' <<<"$TAG_OBJECT")"
          TAG_TYPE="$(jq -r '.object.type' <<<"$TAG_OBJECT")"
          if [ "$TAG_TYPE" = "tag" ]; then
            TAG_SHA="$(gh api "repos/$REPOSITORY/git/tags/$TAG_SHA" --jq '.object.sha')"
          fi
          if [ "$TAG_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Release tag resolves to $TAG_SHA, expected $EXPECTED_SHA."
            exit 1
          fi
      - name: Checkout release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build feanorfs + tray
        run: >-
          cargo build --release -p feanorfs-client -p feanorfs-tray
          --target ${{ matrix.target }} --locked
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p tray-dist
          cp "target/$TARGET/release/feanorfs" tray-dist/
          cp "target/$TARGET/release/feanorfs-tray" tray-dist/
          cd tray-dist
          zip -9 "../feanorfs-tray-$TARGET.zip" feanorfs feanorfs-tray
          cd ..
          shasum -a 256 "feanorfs-tray-$TARGET.zip" > "feanorfs-tray-$TARGET.zip.sha256"
      - name: Attest artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            feanorfs-tray-${{ matrix.target }}.zip
            feanorfs-tray-${{ matrix.target }}.zip.sha256
      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.workflow_run.head_branch }}
          TARGET: ${{ matrix.target }}
        run: >-
          gh release upload "$RELEASE_TAG"
          "feanorfs-tray-$TARGET.zip"
          "feanorfs-tray-$TARGET.zip.sha256"
          --clobber
