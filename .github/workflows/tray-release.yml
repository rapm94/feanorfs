# Build the macOS tray after cargo-dist has created the GitHub Release.
# Keeping this separate leaves cargo-dist's generated release.yml reproducible.
name: Tray release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: tray-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  wait-for-release:
    name: Wait for cargo-dist release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Wait for GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          for attempt in $(seq 1 60); do
            if gh release view "$RELEASE_TAG" --json assets --jq '.assets | length' 2>/dev/null | grep -qv '^0$'; then
              echo "Release $RELEASE_TAG is ready."
              exit 0
            fi
            echo "Waiting for cargo-dist to publish $RELEASE_TAG ($attempt/60)..."
            sleep 30
          done
          echo "::error::Timed out waiting for GitHub Release $RELEASE_TAG."
          exit 1

  build-tray:
    needs: wait-for-release
    name: feanorfs-tray (${{ matrix.target }})
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - name: Verify release tag
        env:
          EXPECTED_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          TAG_OBJECT="$(gh api "repos/$REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          TAG_SHA="$(jq -r '.object.sha' <<<"$TAG_OBJECT")"
          TAG_TYPE="$(jq -r '.object.type' <<<"$TAG_OBJECT")"
          if [ "$TAG_TYPE" = "tag" ]; then
            TAG_SHA="$(gh api "repos/$REPOSITORY/git/tags/$TAG_SHA" --jq '.object.sha')"
          fi
          if [ "$TAG_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Release tag resolves to $TAG_SHA, expected $EXPECTED_SHA."
            exit 1
          fi
      - name: Checkout release commit
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build feanorfs + tray
        run: >-
          cargo build --release -p feanorfs-client -p feanorfs-tray
          --target ${{ matrix.target }} --locked
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p tray-dist
          cp "target/$TARGET/release/feanorfs" tray-dist/
          cp "target/$TARGET/release/feanorfs-tray" tray-dist/
          cd tray-dist
          zip -9 "../feanorfs-tray-$TARGET.zip" feanorfs feanorfs-tray
          cd ..
          shasum -a 256 "feanorfs-tray-$TARGET.zip" > "feanorfs-tray-$TARGET.zip.sha256"
      - name: Attest artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            feanorfs-tray-${{ matrix.target }}.zip
            feanorfs-tray-${{ matrix.target }}.zip.sha256
      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: >-
          gh release upload "$RELEASE_TAG"
          "feanorfs-tray-$TARGET.zip"
          "feanorfs-tray-$TARGET.zip.sha256"
          --clobber
