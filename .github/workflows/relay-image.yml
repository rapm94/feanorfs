name: Relay image

on:
  push:
    tags: ["v*"]

permissions: {}

concurrency:
  group: relay-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native relay image (${{ matrix.oci_arch }})
    if: ${{ github.repository == 'rapm94/feanorfs' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            runner_arch: x86_64
            oci_arch: amd64
          - runner: ubuntu-24.04-arm
            runner_arch: aarch64
            oci_arch: arm64
    steps:
      - name: Checkout immutable tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Verify native runner
        env:
          EXPECTED_ARCH: ${{ matrix.runner_arch }}
        run: test "$(uname -m)" = "$EXPECTED_ARCH"
      - name: Build relay binary natively against the runtime ABI
        env:
          OCI_ARCH: ${{ matrix.oci_arch }}
          RUST_BUILDER: docker.io/library/rust:1.88.0-slim-bookworm@sha256:38bc5a86d998772d4aec2348656ed21438d20fcdce2795b56ca434cf21430d89
        run: |
          docker run --rm --platform "linux/$OCI_ARCH" \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp \
            --env CARGO_HOME=/tmp/cargo-home \
            --volume "$PWD:/src" \
            --workdir /src \
            "$RUST_BUILDER" \
            cargo build --locked --release -p feanorfs-client --bin feanorfs
      - name: Prepare binary-only image context
        run: |
          mkdir relay-context
          install -m 755 target/release/feanorfs relay-context/feanorfs
          cp Dockerfile.relay-binary relay-context/Dockerfile
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push architecture image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: relay-context
          platforms: linux/${{ matrix.oci_arch }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/feanorfs-relay:build-${{ github.sha }}-${{ matrix.oci_arch }}
          sbom: true
          provenance: mode=max
      - name: Attest native architecture image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/feanorfs-relay
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

  merge-manifest:
    name: Publish immutable relay manifest
    needs: build-native
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive final image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/feanorfs-relay
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Merge native images without emulation
        id: merge
        env:
          FINAL_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/feanorfs-relay
          SOURCE_SHA: ${{ github.sha }}
        run: |
          mapfile -t tags <<< "$FINAL_TAGS"
          args=()
          for tag in "${tags[@]}"; do
            [ -n "$tag" ] && args+=(--tag "$tag")
          done
          amd64_digest="$(docker buildx imagetools inspect "$IMAGE:build-$SOURCE_SHA-amd64" --format '{{.Manifest.Digest}}')"
          arm64_digest="$(docker buildx imagetools inspect "$IMAGE:build-$SOURCE_SHA-arm64" --format '{{.Manifest.Digest}}')"
          test -n "$amd64_digest"
          test -n "$arm64_digest"
          docker buildx imagetools create "${args[@]}" \
            "$IMAGE@$amd64_digest" \
            "$IMAGE@$arm64_digest"
          digest="$(docker buildx imagetools inspect "${tags[0]}" --format '{{.Manifest.Digest}}')"
          test -n "$digest"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Attest immutable multi-architecture manifest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/feanorfs-relay
          subject-digest: ${{ steps.merge.outputs.digest }}
          push-to-registry: true
