name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [rust, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
      - name: Analyze
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          category: /language:${{ matrix.language }}

  workflow-security:
    name: Workflow security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # release.yml is generated and validated by cargo-dist. Audit only files
      # owned by this repository so regenerated code never needs local patches.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          advanced-security: false
          annotations: true
          inputs: |
            .github/dependabot.yml
            .github/workflows/ci.yml
            .github/workflows/release-plz.yml
            .github/workflows/security.yml
            .github/workflows/tray-release.yml
          min-severity: medium
          persona: pedantic
          version: "1.26.1"

  scheduled-dependencies:
    name: Scheduled dependency audit
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@8f84122a46a358a27cb0625d85ad60ab436a1b87 # v2
        with:
          command: check
          arguments: --all-features

  security-success:
    name: Security success
    if: ${{ always() }}
    needs:
      - codeql
      - workflow-security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require security jobs
        if: >-
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled') ||
          contains(needs.*.result, 'skipped')
        run: exit 1
      - name: Confirm security success
        run: echo "All required security jobs passed."
