name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run Clippy
        run: >-
          cargo clippy --workspace --exclude feanorfs-tray
          --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV (Rust 1.88)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check minimum supported Rust version
        run: >-
          cargo check --workspace --exclude feanorfs-tray
          --all-targets --all-features --locked

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: >-
          cargo test --workspace --exclude feanorfs-tray
          --all-features --locked

  cross-platform:
    name: Test (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: >-
          cargo test --workspace --exclude feanorfs-tray
          --all-features --locked

  docs:
    name: Documentation
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build documentation
        run: >-
          cargo doc --workspace --exclude feanorfs-tray
          --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  build:
    name: Release build (core)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build optimized workspace
        run: >-
          cargo build --release --workspace --exclude feanorfs-tray --locked

  sdk:
    name: Agent SDK smoke (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build CLI (release)
        run: cargo build --release -p feanorfs-client --locked
      # Debug FFI matches zig build.zig profile_dir (.Debug => target/debug).
      - name: Build FFI (debug for Zig)
        run: cargo build -p feanorfs-ffi --locked
      - name: Verify feanorfs.h is committed
        run: git diff --exit-code -- feanorfs-ffi/feanorfs.h
      - name: SDK-2 CLI loop
        run: bash examples/sdk-agent-loop.sh
        env:
          FEANORFS_BIN: ${{ github.workspace }}/target/release/feanorfs
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/ts/package-lock.json
      - name: SDK-5 Node loop
        working-directory: bindings/ts
        run: |
          npm ci --ignore-scripts
          npm run build
          FEANORFS_BIN="${{ github.workspace }}/target/release/feanorfs" node test/loop.mjs
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: SDK-6 Zig example
        run: |
          WS="$(mktemp -d)/ws"
          mkdir -p "$WS"
          cd "$WS"
          "${{ github.workspace }}/target/release/feanorfs" start --local --workspace zig-ci --no-watch
          echo seed > seed.txt
          "${{ github.workspace }}/target/release/feanorfs" sync --no-watch
          export FEANORFS_WORKSPACE="$WS"
          cd "${{ github.workspace }}/examples/zig-agent"
          zig build
          ./zig-out/bin/zig-agent-demo

  tray:
    name: Tray (macOS)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: clippy
      - name: Install MSRV Rust
        run: rustup toolchain install 1.88.0 --profile minimal
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check tray MSRV
        run: cargo +1.88.0 check -p feanorfs-tray --all-targets --locked
      - name: Run tray Clippy
        run: cargo clippy -p feanorfs-tray --all-targets --locked -- -D warnings
      - name: Run tray tests
        run: cargo test -p feanorfs-tray --locked
      - name: Build feanorfs + tray
        run: cargo build --release -p feanorfs-client -p feanorfs-tray --locked
      - name: Tray CLI smoke
        run: |
          WS="$(mktemp -d)/ws"
          mkdir -p "$WS"
          cd "$WS"
          FNR="${{ github.workspace }}/target/release/feanorfs"
          "$FNR" start --local --workspace tray-ci --no-watch
          echo hello > hello.txt
          "$FNR" sync --no-watch
          "$FNR" --json tray status | jq -e '.mirror_state and .agents'
          "$FNR" --json tray recent | jq -e '.workspaces | length >= 1'
          "$FNR" tray pause
          test -f .feanorfs/paused
          "$FNR" --json tray pause | jq -e '.paused == true'
          "$FNR" tray resume
          if test -f .feanorfs/paused; then
            echo "::error::Tray pause sentinel still exists after resume."
            exit 1
          fi
          "$FNR" --json conflicts list | jq -e 'length == 0'

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          arguments: --all-features

  workflow-lint:
    name: Workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  ci-success:
    name: CI success
    if: ${{ always() }}
    needs:
      - fmt
      - clippy
      - msrv
      - test
      - cross-platform
      - docs
      - build
      - sdk
      - tray
      - dependencies
      - workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require fast PR gates
        if: >-
          needs.fmt.result != 'success' ||
          needs.clippy.result != 'success' ||
          needs.test.result != 'success' ||
          needs.dependencies.result != 'success' ||
          needs.workflow-lint.result != 'success'
        run: exit 1
      - name: Require pre-release gates
        if: >-
          github.event_name != 'pull_request' &&
          (
            needs.msrv.result != 'success' ||
            needs.cross-platform.result != 'success' ||
            needs.docs.result != 'success' ||
            needs.build.result != 'success' ||
            needs.sdk.result != 'success' ||
            needs.tray.result != 'success'
          )
        run: exit 1
      - name: Confirm CI success
        run: echo "All required CI jobs for this event passed."
