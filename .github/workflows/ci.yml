name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (core)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run Clippy
        run: >-
          cargo clippy --workspace --exclude feanorfs-tray
          --all-targets --all-features --locked -- -D warnings

  msrv:
    name: MSRV (Rust 1.88)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check minimum supported Rust version
        run: >-
          cargo check --workspace --exclude feanorfs-tray
          --all-targets --all-features --locked

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: >-
          cargo test --workspace --exclude feanorfs-tray
          --all-features --locked

  cross-platform:
    name: Test (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Run tests
        run: >-
          cargo test --workspace --exclude feanorfs-tray
          --all-features --locked

  docs:
    name: Documentation
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build documentation
        run: >-
          cargo doc --workspace --exclude feanorfs-tray
          --all-features --no-deps --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  build:
    name: Release build (core)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build optimized workspace
        run: >-
          cargo build --release --workspace --exclude feanorfs-tray --locked

  sdk:
    name: Agent SDK smoke (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build CLI (release)
        run: cargo build --release -p feanorfs-client --locked
      # Debug FFI matches zig build.zig profile_dir (.Debug => target/debug).
      - name: Build FFI (debug for Zig)
        run: cargo build -p feanorfs-ffi --locked
      - name: Verify embeddable dependency boundary
        run: |
          tree="$(cargo tree -p feanorfs-agent-core --prefix none)"
          if grep -Eq '^(sqlx|feanorfs-server) v' <<<"$tree"; then
            echo "::error::feanorfs-agent-core depends on SQLite or the server crate."
            exit 1
          fi
      - name: Verify feanorfs.h is committed
        run: git diff --exit-code -- feanorfs-ffi/feanorfs.h
      - name: SDK-2 CLI loop
        run: bash examples/sdk-agent-loop.sh
        env:
          FEANORFS_BIN: ${{ github.workspace }}/target/release/feanorfs
      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/ts/package-lock.json
      - name: SDK-5 Node loop
        working-directory: bindings/ts
        run: |
          npm ci --ignore-scripts
          npm run build
          FEANORFS_BIN="${{ github.workspace }}/target/release/feanorfs" node test/loop.mjs
          npm run create-npm-dir
          npm run assemble-metadata
          npm run verify-metadata

          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64) package_dir=darwin-arm64; artifact=feanorfs-agent-node.darwin-arm64.node ;;
            Darwin-x86_64) package_dir=darwin-x64; artifact=feanorfs-agent-node.darwin-x64.node ;;
            Linux-x86_64) package_dir=linux-x64-gnu; artifact=feanorfs-agent-node.linux-x64-gnu.node ;;
            *) echo "::error::Unsupported SDK smoke host."; exit 1 ;;
          esac
          cp "$artifact" "npm/$package_dir/$artifact"

          dist="$(mktemp -d)"
          smoke="$(mktemp -d)"
          trap 'rm -rf "$dist" "$smoke"' EXIT
          version="$(node -p 'require("./package.json").version')"
          npm pack --pack-destination "$dist" .
          npm pack --pack-destination "$dist" "./npm/$package_dir"
          cp test/loop.mjs "$smoke/loop.mjs"
          printf '%s\n' '{"name":"packed-smoke","private":true,"type":"module"}' >"$smoke/package.json"
          (
            cd "$smoke"
            npm install --offline --ignore-scripts --registry=http://127.0.0.1:9 \
              "$dist/feanorfs-agent-$version.tgz" \
              "$dist/feanorfs-agent-$package_dir-$version.tgz"
            FEANORFS_AGENT_IMPORT=@feanorfs/agent \
              FEANORFS_BIN="${{ github.workspace }}/target/release/feanorfs" \
              node loop.mjs
          )
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0
      - name: SDK-6 Zig example
        run: |
          WS="$(mktemp -d)/ws"
          mkdir -p "$WS"
          cd "$WS"
          "${{ github.workspace }}/target/release/feanorfs" start --local --workspace zig-ci --no-watch
          echo seed > seed.txt
          "${{ github.workspace }}/target/release/feanorfs" sync --no-watch
          export FEANORFS_WORKSPACE="$WS"
          cd "${{ github.workspace }}/examples/zig-agent"
          zig build
          ./zig-out/bin/zig-agent-demo

  tray:
    name: Tray (macOS)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - name: Install MSRV Rust
        run: rustup toolchain install 1.88.0 --profile minimal
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check tray MSRV
        run: cargo +1.88.0 check -p feanorfs-tray --all-targets --locked
      - name: Run tray Clippy
        run: cargo clippy -p feanorfs-tray --all-targets --locked -- -D warnings
      - name: Run tray tests
        run: cargo test -p feanorfs-tray --locked
      - name: Build feanorfs + tray
        run: cargo build --release -p feanorfs-client -p feanorfs-tray --locked
      - name: Test unified installer routing
        run: |
          bash scripts/test-install-routing.sh
          if bash scripts/smoke-macos-keychain.sh target/release/feanorfs; then
            echo "::error::Unsigned development binary unexpectedly passed signed-release credential smoke."
            exit 1
          fi
      - name: Assemble and smoke macOS package
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "feanorfs-client") | .version')"
          ROOT="$(mktemp -d)"
          sh scripts/package-macos.sh assemble \
            "$VERSION" \
            target/release/feanorfs \
            target/release/feanorfs-tray \
            "$ROOT/build"
          sh scripts/package-macos.sh build \
            "$VERSION" \
            "$ROOT/build" \
            "$ROOT/FeanorFS-macOS-unsigned.pkg"
          sh scripts/package-macos.sh dmg \
            "$VERSION" \
            "$ROOT/FeanorFS-macOS-unsigned.pkg" \
            "$ROOT/FeanorFS-macOS-unsigned.dmg"
          pkgutil --expand-full \
            "$ROOT/FeanorFS-macOS-unsigned.pkg" \
            "$ROOT/expanded"
          CLI="$ROOT/expanded/Payload/usr/local/bin/feanorfs"
          APP="$ROOT/expanded/Payload/Applications/FeanorFS.app"
          test -x "$ROOT/expanded/Scripts/postinstall"
          grep -F -- '--first-run' "$ROOT/expanded/Scripts/postinstall"
          cmp target/release/feanorfs "$CLI"
          cmp target/release/feanorfs-tray "$APP/Contents/MacOS/feanorfs-tray"
          plutil -extract CFBundleIdentifier raw -o - "$APP/Contents/Info.plist" | grep -Fx com.feanorfs.tray
          plutil -extract LSUIElement raw -o - "$APP/Contents/Info.plist" | grep -Fx true
          lipo "$CLI" -verify_arch "$(uname -m)"
          lipo "$APP/Contents/MacOS/feanorfs-tray" -verify_arch "$(uname -m)"
          mkdir "$ROOT/dmg"
          hdiutil attach -quiet -readonly -nobrowse \
            -mountpoint "$ROOT/dmg" "$ROOT/FeanorFS-macOS-unsigned.dmg"
          cmp "$ROOT/FeanorFS-macOS-unsigned.pkg" "$ROOT/dmg/FeanorFS-macOS.pkg"
          hdiutil detach -quiet "$ROOT/dmg"
          bash scripts/smoke-macos-product.sh \
            "$CLI" \
            "$APP/Contents/MacOS/feanorfs-tray"
      - name: Tray CLI smoke
        run: |
          WS="$(mktemp -d)/ws"
          mkdir -p "$WS"
          cd "$WS"
          FNR="${{ github.workspace }}/target/release/feanorfs"
          "$FNR" start --local --workspace tray-ci --no-watch
          echo hello > hello.txt
          "$FNR" sync --no-watch
          "$FNR" --json tray status | jq -e '.mirror_state and .agents'
          "$FNR" --json tray recent | jq -e '.workspaces | length >= 1'
          "$FNR" tray pause
          test ! -e .feanorfs
          test ! -e .feanorfsignore
          "$FNR" --json tray pause | jq -e '.paused == true'
          "$FNR" tray resume
          "$FNR" --json tray status | jq -e '.paused == false'
          test ! -e .feanorfs
          test ! -e .feanorfsignore
          "$FNR" --json conflicts list | jq -e 'length == 0'

  desktop-tray:
    name: Tray (${{ matrix.os }})
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Linux desktop dependencies
        if: ${{ runner.os == 'Linux' }}
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y --no-install-recommends
          cpio libgtk-3-dev libxdo-dev libayatana-appindicator3-dev rpm zstd
      - name: Install pinned nFPM
        if: ${{ runner.os == 'Linux' }}
        env:
          NFPM_SHA256: 0660ca602b2d2d2ae4781a06c692b3eeb9d437ffea05b831d76e41f4a3188783
          NFPM_VERSION: 2.47.0
        run: |
          archive="nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          url="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/${archive}"
          mkdir -p "$RUNNER_TEMP/nfpm"
          curl --proto '=https' --tlsv1.2 -fLsS "$url" -o "$RUNNER_TEMP/$archive"
          echo "$NFPM_SHA256  $RUNNER_TEMP/$archive" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP/nfpm" nfpm
          "$RUNNER_TEMP/nfpm/nfpm" --version | grep -F "${NFPM_VERSION}"
          echo "$RUNNER_TEMP/nfpm" >> "$GITHUB_PATH"
      - name: Parse Windows product installer
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          [void][scriptblock]::Create((Get-Content -Raw scripts/install.ps1))
          [void][scriptblock]::Create((Get-Content -Raw scripts/test-install-routing.ps1))
          [void][scriptblock]::Create((Get-Content -Raw scripts/smoke-windows-installer.ps1))
          scripts/test-install-routing.ps1
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - name: Install MSRV Rust
        run: rustup toolchain install 1.88.0 --profile minimal
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Check tray MSRV
        run: cargo +1.88.0 check -p feanorfs-tray --all-targets --locked
      - name: Run tray Clippy
        run: cargo clippy -p feanorfs-tray --all-targets --locked -- -D warnings
      - name: Run tray tests
        run: cargo test -p feanorfs-tray --locked
      - name: Build colocated desktop product
        run: cargo build --release -p feanorfs-client -p feanorfs-tray --locked
      - name: Verify colocated CLI and tray payload
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)
              test -x target/release/feanorfs
              test -x target/release/feanorfs-tray
              if ldd target/release/feanorfs-tray | grep -F 'not found'; then
                echo "::error::Linux tray has unresolved shared libraries."
                exit 1
              fi
              ;;
            Windows)
              test -f target/release/feanorfs.exe
              test -f target/release/feanorfs-tray.exe
              ;;
            *)
              echo "::error::Unexpected desktop runner $RUNNER_OS."
              exit 1
              ;;
          esac
      - name: Smoke Windows product lifecycle
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: >-
          scripts/smoke-windows-product.ps1
          target/release/feanorfs.exe
          target/release/feanorfs-tray.exe
      - name: Compile and smoke Windows installer
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $candidate = Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"
            if (Test-Path -PathType Leaf $candidate) { $iscc = $candidate }
          }
          if (-not $iscc) { throw "GitHub's Windows runner does not provide Inno Setup 6." }
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = $metadata.packages | Where-Object name -eq feanorfs-client | Select-Object -ExpandProperty version
          $output = Join-Path $env:RUNNER_TEMP "windows-installer"
          New-Item -ItemType Directory -Force -Path $output | Out-Null
          & $iscc "/DAppVersion=$version" "/DSourceDir=$pwd\target\release" "/DRepoRoot=$pwd" "/DOutputDir=$output" scripts/windows-installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with status $LASTEXITCODE." }
          scripts/smoke-windows-installer.ps1 "$output/FeanorFS-windows-x86_64-setup.exe" target/release/feanorfs.exe target/release/feanorfs-tray.exe
      - name: Build and verify native Linux packages
        if: ${{ runner.os == 'Linux' }}
        run: scripts/package-linux.sh "$RUNNER_TEMP/linux-packages"
      - name: Smoke clean Debian, Fedora, and Arch installs
        if: ${{ runner.os == 'Linux' }}
        run: >-
          scripts/smoke-linux-packages.sh
          "$RUNNER_TEMP/linux-packages/FeanorFS-linux-x86_64.deb"
          "$RUNNER_TEMP/linux-packages/FeanorFS-linux-x86_64.rpm"
          "$RUNNER_TEMP/linux-packages/FeanorFS-linux-x86_64.pkg.tar.zst"

  relay-container:
    name: Relay container
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build and smoke hardened relay image
        run: sh scripts/smoke-relay-container.sh
        env:
          FEANORFS_RELAY_SMOKE_IMAGE: feanorfs-relay-ci:scan
          KEEP_FEANORFS_RELAY_SMOKE_IMAGE: "1"
      - name: Scan relay runtime image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: feanorfs-relay-ci:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
          arguments: --all-features

  workflow-lint:
    name: Workflow syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Run actionlint
        uses: raven-actions/actionlint@3d39aea434753780c3b3d4a1a31c854b4dbf49d7 # v2.2.0

  ci-success:
    name: CI success
    if: ${{ always() }}
    needs:
      - fmt
      - clippy
      - msrv
      - test
      - cross-platform
      - docs
      - build
      - sdk
      - tray
      - desktop-tray
      - relay-container
      - dependencies
      - workflow-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require fast PR gates
        if: >-
          needs.fmt.result != 'success' ||
          needs.clippy.result != 'success' ||
          needs.test.result != 'success' ||
          needs.dependencies.result != 'success' ||
          needs.workflow-lint.result != 'success'
        run: exit 1
      - name: Require pre-release gates
        if: >-
          github.event_name != 'pull_request' &&
          (
            needs.msrv.result != 'success' ||
            needs.cross-platform.result != 'success' ||
            needs.docs.result != 'success' ||
            needs.build.result != 'success' ||
            needs.sdk.result != 'success' ||
            needs.tray.result != 'success' ||
            needs.desktop-tray.result != 'success' ||
            needs.relay-container.result != 'success'
          )
        run: exit 1
      - name: Confirm CI success
        run: echo "All required CI jobs for this event passed."
