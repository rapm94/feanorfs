name: Release-plz

# release-plz automates semantic versioning, changelog generation, and git tags
# from Conventional Commits. GitHub Releases and binary artifacts are handled
# by cargo-dist (.github/workflows/release.yml) when the tag is pushed.
# This workflow runs only after CI succeeds on a trusted main-branch push, so a
# failing commit cannot publish a release. workflow_dispatch is the recovery path.
#
# Prerequisite — secret RELEASE_PLZ_TOKEN (PAT with contents:write +
# pull-requests:write), either:
#   • Repository secret: Settings → Secrets and variables → Actions
#   • Environment secret: Settings → Environments → prod → Environment secrets
#     (requires `environment: prod` on each job below)
# The default GITHUB_TOKEN cannot trigger downstream workflows on tag push.

on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    workflows: ["CI"]
    branches:
      - main
    types: [completed]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-plz-main
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Verify release token
        env:
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' }}
        run: |
          if [ "$HAS_RELEASE_TOKEN" != "true" ]; then
            echo "::error::Missing secret RELEASE_PLZ_TOKEN."
            echo "Add it as a repository secret (Settings → Secrets → Actions)"
            echo "or as an environment secret on the 'prod' environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Verify CI-tested commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::main advanced to $ACTUAL_SHA after CI tested $EXPECTED_SHA."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Run release-plz (release)
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release
          forge: github
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-pr:
    name: Release PR
    needs: release-plz-release
    if: ${{ needs.release-plz-release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Verify release token
        env:
          HAS_RELEASE_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN != '' }}
        run: |
          if [ "$HAS_RELEASE_TOKEN" != "true" ]; then
            echo "::error::Missing secret RELEASE_PLZ_TOKEN."
            echo "Add it as a repository secret (Settings → Secrets → Actions)"
            echo "or as an environment secret on the 'prod' environment."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: main

      - name: Verify CI-tested commit
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::main advanced to $ACTUAL_SHA after CI tested $EXPECTED_SHA."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Configure cargo for git-only release history
        env:
          CARGO_WRAPPER: ${{ runner.temp }}/release-plz-cargo
        run: |
          cat > "$CARGO_WRAPPER" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          real_cargo="$(rustup which cargo)"
          historical_workspace=false
          for arg in "$@"; do
            if [ "$arg" = "--workspace" ]; then
              historical_workspace=true
              break
            fi
          done
          if [ "${1:-}" = "package" ] && [ "$historical_workspace" = true ]; then
            "$real_cargo" "$@" --no-verify
            target_dir="$("$real_cargo" metadata --format-version 1 --no-deps | jq -r '.target_directory')"
            for archive in "$target_dir"/package/*.crate; do
              tar -xzf "$archive" -C "$target_dir/package"
            done
            exit 0
          fi
          exec "$real_cargo" "$@"
          EOF
          chmod +x "$CARGO_WRAPPER"

      - name: Run release-plz (release-pr)
        id: release-plz
        uses: release-plz/action@2eb1d8bcb770b4c48ccfaad919734b38b51958c9 # v0.5.131
        with:
          command: release-pr
          forge: github
        env:
          CARGO: ${{ runner.temp }}/release-plz-cargo
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Sync npm versions into release PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          RELEASE_PR: ${{ steps.release-plz.outputs.pr }}
        run: |
          set -euo pipefail
          pr_number="$(jq -r 'try .number // empty' <<<"$RELEASE_PR")"
          if [ -z "$pr_number" ]; then
            exit 0
          fi
          gh auth setup-git
          gh pr checkout "$pr_number"
          npm --prefix bindings/ts run assemble-metadata
          npm --prefix bindings/ts run verify-metadata
          git diff --check
          if git diff --quiet -- bindings/ts/package.json bindings/ts/package-lock.json bindings/ts/npm; then
            exit 0
          fi
          git config user.name "release-plz[bot]"
          git config user.email "release-plz[bot]@users.noreply.github.com"
          git add bindings/ts/package.json bindings/ts/package-lock.json bindings/ts/npm/*/package.json
          git commit -m "chore(release): sync npm package versions"
          git push
