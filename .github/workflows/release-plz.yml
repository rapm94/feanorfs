name: Release-plz

# release-plz automates semantic versioning, changelog generation, and
# GitHub release creation based on Conventional Commits.
#
# Prerequisite (repository secret, exact name):
#   RELEASE_PLZ_TOKEN — fine-grained or classic PAT with contents:write and
#   pull-requests:write. Must be a repo Actions secret (Settings → Secrets →
#   Actions), not only an environment secret unless this job sets `environment:`.
#   The default GITHUB_TOKEN cannot trigger the release.yml tag build workflow.

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release token
        run: |
          if [ -z "${{ secrets.RELEASE_PLZ_TOKEN }}" ]; then
            echo "::error::Missing repository secret RELEASE_PLZ_TOKEN (exact name, case-sensitive)."
            echo "Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run release-plz (release-pr)
        uses: release-plz/action@v0.5
        with:
          command: release-pr
          forge: github
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify release token
        run: |
          if [ -z "${{ secrets.RELEASE_PLZ_TOKEN }}" ]; then
            echo "::error::Missing repository secret RELEASE_PLZ_TOKEN (exact name, case-sensitive)."
            exit 1
          fi

      - name: Run release-plz (release)
        uses: release-plz/action@v0.5
        with:
          command: release
          forge: github
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
