version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Madrid
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 10
    labels:
      - ci
      - dependencies

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Madrid
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      rust-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    open-pull-requests-limit: 10
    labels:
      - rust
      - dependencies

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:25"
      timezone: Europe/Madrid
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies

  - package-ecosystem: npm
    directory: /bindings/ts
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: Europe/Madrid
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    labels:
      - sdk
      - dependencies
