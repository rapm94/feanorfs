[workspace]
# FeanorFS is distributed as pre-built binaries, not via crates.io.
publish = false
# Cargo package verification cannot resolve unpublished internal workspace
# crates from crates.io and provides no useful release gate for binary-only
# distribution. API compatibility remains covered by workspace CI.
semver_check = false
publish_no_verify = true

# Only bump/version the leaf crate. Internal workspace members still inherit
# `version.workspace = true`; release-plz must not `cargo package` crates with
# unpublished path deps (feanorfs-ffi, feanorfs-client, …).
release = false

# Unpublished workspace: derive versions from git tags, not crates.io.
git_only = true

# Tag only when the release PR is merged, not on every push to main.
release_always = false

# All crates inherit version via `version.workspace = true`, so a single
# release-plz run bumps every member crate together and produces one tag.
#
# release-plz: version bump, changelog, git tag (via RELEASE_PLZ_TOKEN PAT).
# cargo-dist: tag push triggers .github/workflows/release.yml → binaries,
# installers, checksums, and the GitHub Release (git_release_enable = false).
git_tag_enable = true
git_release_enable = false
git_tag_name = "v{{ version }}"

[[package]]
name = "feanorfs-common"
release = true
changelog_include = [
  "feanorfs-client",
  "feanorfs-server",
  "feanorfs-agent-core",
  "feanorfs-ffi",
  "feanorfs-agent-node",
  "feanorfs-tray",
]
