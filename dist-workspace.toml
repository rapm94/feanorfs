[workspace]
# Explicitly list dist-able packages — excludes `tray` (macOS-only GUI).
# Release archives for `feanorfs-tray` are built alongside cargo-dist in
# `.github/workflows/release.yml`.
members = ["cargo:client", "cargo:server"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Whether to enable GitHub Attestations
github-attestations = true
# When to generate GitHub Attestations
github-attestations-phase = "host"
# Patterns to attest when creating attestations for release artifacts
github-attestations-filters = ["*.tar.xz", "*.zip", "*.sh", "*.ps1"]
