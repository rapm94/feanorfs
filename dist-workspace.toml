[workspace]
# Point cargo-dist at the Cargo workspace once. Package selection belongs in
# `[dist].packages`; listing member paths separately rediscovers the workspace.
# `.github/workflows/tray-release.yml` builds tray archives after cargo-dist
# completes, leaving its generated `.github/workflows/release.yml` unchanged.
members = ["cargo:."]

# Config for 'dist'
[dist]
# Only the cross-platform CLI and legacy server are cargo-dist applications.
# The macOS-only tray is released by `.github/workflows/tray-release.yml`.
packages = ["feanorfs-client", "feanorfs-server"]
# Avoid `cargo build --workspace`, which would compile the tray on Linux.
precise-builds = true
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Whether to enable GitHub Attestations
github-attestations = true
# When to generate GitHub Attestations
github-attestations-phase = "host"
# Patterns to attest when creating attestations for release artifacts
github-attestations-filters = ["*.tar.xz", "*.zip", "*.sh", "*.ps1"]
