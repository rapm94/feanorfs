[workspace]
members = ["common", "server", "client"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
authors = ["Raul Puigbó <raulapuigbo@gmail.com>"]
repository = "https://github.com/raulpuigbo/fs-sync"
homepage = "https://github.com/raulpuigbo/fs-sync"
readme = "README.md"
keywords = ["sync", "filesystem", "e2ee", "blake3", "sqlite"]
categories = ["command-line-utilities", "filesystem"]

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite"] }
clap = { version = "4.4", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "multipart", "stream"] }
ignore = "0.4"
notify = "6.1"
blake3 = "1.5"
axum = { version = "0.7", features = ["multipart"] }
tower-http = { version = "0.5", features = ["fs", "trace"] }
futures-util = "0.3"
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3.10"
walkdir = "2.5"
